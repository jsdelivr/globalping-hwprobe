# Extlinux configuration for NanoPi Zero2 (eMMC Programmer Image - SD Card)
# Root device: EXPLICIT /dev/mmcblk0p3 - SD card partition 3
# This ensures we boot from SD card even when eMMC has a rootfs partition
# (Prevents race condition where eMMC partitions are detected first)
label Yocto Linux
    kernel /boot/Image
    fdt /boot/rk3528-nanopi-rev01.dtb
    append root=/dev/mmcblk0p3 rootwait rootfstype=ext4 console=ttyFIQ0,1500000n8 earlycon=uart8250,mmio32,0xff9f0000
