#@TYPE: Machine
#@NAME: NanoPi Zero2
#@DESCRIPTION: FriendlyElec NanoPi Zero2 - Rockchip RK3528A based board with Gigabit Ethernet, USB, and M.2 WiFi support
#https://www.friendlyelec.com/index.php?route=product/product&product_id=304

require conf/machine/include/rk3528.inc

# Use FriendlyElec kernel and U-Boot
PREFERRED_PROVIDER_virtual/kernel = "linux-friendlyarm"
PREFERRED_PROVIDER_virtual/bootloader = "u-boot-nanopi-zero2-prebuilt"
PREFERRED_VERSION_linux-friendlyarm = "6.1%"
# U-Boot: Using pre-built binaries due to 2017.09 compatibility issues with modern Yocto
# See meta-nanopi-zero2/recipes-bsp/u-boot/files/README-uboot-binaries.txt

# Use proper RK3528 device tree from FriendlyElec kernel
KERNEL_DEVICETREE = "rockchip/rk3528-nanopi-rev01.dtb"

# Use plain kernel Image instead of FIT image for old U-Boot 2017.09
KERNEL_IMAGETYPE = "Image"
KERNEL_IMAGETYPES = "Image"

# Include kernel modules (use RDEPENDS for core-image-minimal compatibility)
MACHINE_ESSENTIAL_EXTRA_RDEPENDS += "kernel-modules"

# U-Boot configuration - use FriendlyElec's defconfig
UBOOT_MACHINE = "nanopi5_defconfig"

# Board-specific features
MACHINE_FEATURES += "pci"

# WiFi firmware (for optional M.2 WiFi module)
MACHINE_EXTRA_RRECOMMENDS += "linux-firmware-rtl8821"

# WIC configuration - Use A/B partition layout for RAUC OTA updates
# nanopi-zero2-ab.wks: Dual rootfs (rootfs-a, rootfs-b) for RAUC
# nanopi-zero2-single.wks: Original single rootfs layout (backup)
WKS_FILE = "nanopi-zero2-ab.wks"

# Image types - ext4 needed for RAUC bundles
IMAGE_FSTYPES:append = " ext4"