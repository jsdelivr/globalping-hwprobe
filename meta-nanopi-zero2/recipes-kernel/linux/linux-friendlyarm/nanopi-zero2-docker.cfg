# Container networking support
# These options are required for Docker, Podman, and LXC networking

# Virtual Ethernet (veth) pairs for container networking
CONFIG_VETH=m

# Bridge support for container networks
CONFIG_BRIDGE=m

# Bridge netfilter support (required for Docker iptables rules)
CONFIG_BRIDGE_NETFILTER=y

# Netfilter dependencies for bridge filtering
CONFIG_NETFILTER_ADVANCED=y
CONFIG_NETFILTER_XTABLES=m
CONFIG_NF_CONNTRACK=m
CONFIG_IP_VS=m
CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=m
CONFIG_NETFILTER_XT_MATCH_CONNTRACK=m
CONFIG_NETFILTER_XT_MATCH_IPVS=m

# IP tables support (required for Docker networking)
CONFIG_IP_NF_IPTABLES=m
CONFIG_IP_NF_FILTER=m
CONFIG_IP_NF_NAT=m
CONFIG_IP_NF_TARGET_MASQUERADE=m

# IPv6 support for containers
CONFIG_IP6_NF_IPTABLES=m
CONFIG_IP6_NF_FILTER=m
CONFIG_IP6_NF_NAT=m
CONFIG_IP6_NF_TARGET_MASQUERADE=m
