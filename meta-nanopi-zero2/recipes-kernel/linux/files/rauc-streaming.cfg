# RAUC Streaming and Adaptive Updates Support
# NBD (Network Block Device) for streaming bundles
# Built-in (not module) to ensure always available for RAUC streaming
CONFIG_BLK_DEV_NBD=y

# Loop device for bundle mounting
CONFIG_BLK_DEV_LOOP=y

# dm-verity for verity bundle format
CONFIG_DM_VERITY=y
CONFIG_DM_VERITY_FEC=y

# Squashfs for bundle content (if using squashfs slots)
CONFIG_SQUASHFS=m
CONFIG_SQUASHFS_ZLIB=y
CONFIG_SQUASHFS_LZO=y
CONFIG_SQUASHFS_XZ=y
CONFIG_SQUASHFS_ZSTD=y
