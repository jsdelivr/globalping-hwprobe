# Namespaces
CONFIG_NAMESPACES=y
CONFIG_UTS_NS=y
CONFIG_IPC_NS=y
CONFIG_PID_NS=y
CONFIG_NET_NS=y
CONFIG_USER_NS=y

# Cgroups (v1/v2 core)
CONFIG_CGROUPS=y
CONFIG_CGROUP_SCHED=y
CONFIG_CGROUP_PIDS=y
CONFIG_CGROUP_FREEZER=y
CONFIG_CGROUP_DEVICE=y
CONFIG_CGROUP_CPUACCT=y
CONFIG_CGROUP_BPF=y
CONFIG_CGROUP_RDMA=y
CONFIG_CPUSETS=y
CONFIG_MEMCG=y
CONFIG_BLK_CGROUP=y
CONFIG_CGROUP_PERF=y
CONFIG_CGROUP_WRITEBACK=y
CONFIG_CGROUP_MISC=y
CONFIG_CGROUP_FREEZER=y

# Filesystems
CONFIG_OVERLAY_FS=m
CONFIG_EXT4_FS=y
CONFIG_BTRFS_FS=m
CONFIG_SQUASHFS=m

# Networking / bridge / nftables (Docker default)
CONFIG_BRIDGE=m
CONFIG_BRIDGE_NETFILTER=m
CONFIG_NETFILTER=y
CONFIG_NETFILTER_XTABLES=y
CONFIG_NF_TABLES=y
CONFIG_NF_TABLES_INET=y
CONFIG_NFT_MASQ=m
CONFIG_NFT_NAT=m
CONFIG_NFT_CT=m
CONFIG_NF_CONNTRACK=m
CONFIG_NF_NAT=m
CONFIG_IP_NF_IPTABLES=m
CONFIG_IP_NF_FILTER=m

# Misc common container reqs
CONFIG_DEVPTS_MULTIPLE_INSTANCES=y
CONFIG_VETH=m
CONFIG_MACVLAN=m
CONFIG_DUMMY=m

# Overlayfs xattrs/metadata (good defaults)
CONFIG_OVERLAY_FS_XINO_AUTO=y
CONFIG_OVERLAY_FS_INDEX=y
CONFIG_OVERLAY_FS_METACOPY=y
