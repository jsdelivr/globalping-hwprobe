# RAUC System Configuration for NanoPi Zero2
# A/B boot selection using GPT legacy_boot flag

[system]
compatible=nanopi-zero2
bootloader=custom
mountprefix=/mnt/rauc
# Data directory for adaptive updates (stores block hash indices)
# This enables delta-like updates - only changed blocks are downloaded
data-directory=/persist/rauc

[keyring]
path=/etc/rauc/ca.cert.pem

[handlers]
# Custom bootloader backend - handles get-primary, set-primary, get-state, set-state
bootloader-custom-backend=/usr/lib/rauc/custom-bootloader.sh
# Pre-install handler - remounts /persist as rw for RAUC status files
pre-install=/usr/lib/rauc/pre-install.sh
# Post-install handler - updates extlinux.conf for correct slot, remounts /persist ro
post-install=/usr/lib/rauc/post-install.sh

[slot.rootfs.0]
device=/dev/disk/by-partlabel/rootfs-a
type=ext4
bootname=a

[slot.rootfs.1]
device=/dev/disk/by-partlabel/rootfs-b
type=ext4
bootname=b
