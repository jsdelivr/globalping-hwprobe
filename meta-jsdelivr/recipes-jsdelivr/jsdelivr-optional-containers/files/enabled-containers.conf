# jsdelivr Optional Containers Configuration
#
# Enable or disable optional Docker containers
# Set to 1 to enable, 0 to disable
#
# Note: Container names use underscores instead of hyphens in variable names
# Example: netdata -> ENABLE_NETDATA
#
# To make changes persistent across reboots, copy this file to:
# /persist/jsdelivr-config/enabled-containers.conf
#
# DEFAULT: All optional containers are ENABLED in full image
# Use baseonly image if you only want globalping-probe

# Netdata - Real-time system and network monitoring
# Access at: http://device-ip:19999
ENABLE_NETDATA=1

# Wireguard - VPN for secure remote management
# Configure in: /docker_persist/wireguard/
ENABLE_WIREGUARD=1

# CrowdSec - Collaborative intrusion prevention system
# Monitors logs and blocks malicious IPs
# Disk: ~150-600MB (Docker volumes) | RAM: ~100-150MB
ENABLE_CROWDSEC=1
