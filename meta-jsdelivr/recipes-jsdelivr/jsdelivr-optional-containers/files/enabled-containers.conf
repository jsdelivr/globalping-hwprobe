# jsdelivr Optional Containers Configuration
#
# Enable or disable optional Docker containers
# Set to 1 to enable, 0 to disable
#
# Note: Container names use underscores instead of hyphens in variable names
#
# To make changes persistent across reboots, copy this file to:
# /persist/jsdelivr-config/enabled-containers.conf
#
# Containers are added dynamically via ./add-container.sh


# crowdsecurity/crowdsec:slim
ENABLE_CROWDSEC=1

# netdata/netdata:latest
ENABLE_NETDATA=1

# linuxserver/wireguard:latest
ENABLE_WIREGUARD=1
